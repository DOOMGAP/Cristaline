name: CI - Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  # 2. Tests et Qualité Code
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run Maven Tests (H2)
        run: mvn test
        working-directory: cristal/api

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: cristal/front
      - name: Run tests
        run : npm run test -- --watch=false --browsers=ChromeHeadless
        working-directory: cristal/front

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: cristal/front
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: cristal/front
      - name: Prepare docker env
        run: |
          cat <<'EOF' > .env
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          POSTGRES_DB=cristal
          POSTGRES_PORT=55432
          PGADMIN_DEFAULT_EMAIL=admin@cristal.local
          PGADMIN_DEFAULT_PASSWORD=admin
          PGADMIN_PORT=18081
          API_PORT=8080
          FRONT_PORT=4200
          KAFKA_PORT=29092
          KAFKA_EXTERNAL_PORT=39092
          KAFKA_CONSOLE_PORT=18082
          SPRING_PROFILES_ACTIVE=prod
          SPRING_DATASOURCE_URL=jdbc:postgresql://consumer-postgresql:5432/cristal
          SPRING_DATASOURCE_USERNAME=postgres
          SPRING_DATASOURCE_PASSWORD=postgres
          KAFKA_BOOTSTRAP_SERVERS=kafka-0:9092
          APP_SEED_ENABLED=false
          EOF
        working-directory: cristal
      - name: Run e2e suite
        run: ./scripts/run-e2e.sh
        working-directory: cristal

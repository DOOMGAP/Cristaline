name: CI - Build

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout du code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Java (Backend)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # 3. Build + tests backend
      - name: Build and test backend
        working-directory: cristal/api
        run: mvn clean verify

      # 4. Setup Node (Frontend)
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: cristal/front/package-lock.json

      # 5. Install dépendances frontend
      - name: Install frontend dependencies
        working-directory: cristal/front
        run: npm install --legacy-peer-deps

      # 6. Build frontend Angular
      - name: Build frontend
        working-directory: cristal/front
        run: npm run build --if-present

      # 7. Vérification Docker
      - name: Build Docker images
        working-directory: cristal
        run: docker compose build

 release-production:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker Images
        working-directory: cristal
        run: |
          # On build les images localement sur le runner
          docker build -t cristaline-api:latest ./api
          docker build -t cristaline-front:latest ./front

      # 1. On transforme les images Docker en fichiers .tar physiques
      - name: Save Docker images to tarballs
        run: |
          docker save cristaline-api:latest > cristaline-api.tar
          docker save cristaline-front:latest > cristaline-front.tar

      # 2. On crée la Release et on upload les .tar comme "Assets"
      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            cristaline-api.tar
            cristaline-front.tar
          generate_release_notes: true
          draft: false
          prerelease: false

      # 3. (Optionnel) On les pousse aussi sur GHCR (pour le docker pull)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker tag cristaline-api:latest ghcr.io/${REPO_NAME}-api:latest
          docker tag cristaline-front:latest ghcr.io/${REPO_NAME}-front:latest
          docker push ghcr.io/${REPO_NAME}-api:latest
          docker push ghcr.io/${REPO_NAME}-front:latest

          docker push $API_IMAGE --all-tags
          docker push $FRONT_IMAGE --all-tags

name: CI - Build

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout du code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Java (Backend)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # 3. Build + tests backend
      - name: Build and test backend
        working-directory: cristal/api
        run: mvn clean verify

      # 4. Setup Node (Frontend)
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: cristal/front/package-lock.json

      # 5. Install dépendances frontend
      - name: Install frontend dependencies
        working-directory: cristal/front
        run: npm install --legacy-peer-deps

      # 6. Build frontend Angular
      - name: Build frontend
        working-directory: cristal/front
        run: npm run build --if-present

      # 7. (Optionnel) Vérification Docker
      - name: Build Docker images
        working-directory: cristal
        run: docker compose build

  release:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push Images
        working-directory: cristal
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          API_IMAGE="ghcr.io/${REPO_NAME}-api"
          FRONT_IMAGE="ghcr.io/${REPO_NAME}-front"
        
          docker build -t $API_IMAGE:latest -t $API_IMAGE:${{ github.sha }} ./api
          docker build -t $FRONT_IMAGE:latest -t $FRONT_IMAGE:${{ github.sha }} ./front
        
          docker push $API_IMAGE:latest
          docker push $API_IMAGE:${{ github.sha }}
          docker push $FRONT_IMAGE:latest
          docker push $FRONT_IMAGE:${{ github.sha }}
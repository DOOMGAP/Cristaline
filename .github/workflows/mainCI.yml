name: CI/CD Cristal Fullstack

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  # 1. Analyse Statique & Sécurité Dépendances
  security-and-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important pour SonarCloud

      # Scan des vulnérabilités Maven (Backend)
      - name: Snyk Backend Scan
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SYNK_TOKEN }}
        with:
          args: --file=cristal/api/pom.xml

      # Scan des vulnérabilités NPM (Frontend)
      - name: Snyk Frontend Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SYNK_TOKEN }}
        with:
          args: cristal/front

  # 2. Tests et Qualité Code
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run Maven Tests (H2)
        run: mvn test
        working-directory: cristal/api

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install & Test
        run: |
          npm ci --legacy-peer-deps
          npm run test -- --watch=false --browsers=ChromeHeadless
        working-directory: cristal/front

  # 3. Build & Push Docker Images
  build-and-push:
    needs: [backend-tests, frontend-tests, security-and-quality]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend
        uses: docker/build-push-action@v5
        with:
          context: ./cristal/api
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cristal-api:latest

      - name: Build Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./cristal/front
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cristal-front:latest

  # 4. Déploiement
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /path/to/cristal
            docker-compose pull
            docker-compose up -d

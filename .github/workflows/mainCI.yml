name: CI/CD Cristal Fullstack

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  # 2. Tests et Qualité Code
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run Maven Tests (H2)
        run: mvn test
        working-directory: cristal/api

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: cristal/front
      - name: Force Webpack for Karma
        run: npm install --legacy-peer-deps --save-dev webpack webpack-dev-server
        working-directory: cristal/front
      - name: Run tests
        run : npm run test -- --watch=false --browsers=ChromeHeadless
        working-directory: cristal/front
  # 3. Build & Push Docker Images
  build-and-push:
    needs: [backend-tests, frontend-tests, security-and-quality]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend
        uses: docker/build-push-action@v5
        with:
          context: ./cristal/api
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cristal-api:latest

      - name: Build Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./cristal/front
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cristal-front:latest

  # 4. Déploiement
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /path/to/cristal
            docker-compose pull
            docker-compose up -d

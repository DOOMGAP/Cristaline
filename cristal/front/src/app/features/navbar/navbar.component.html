<nav class="navbar">

    <div class="spacer"></div>
    <div *ngIf="(authService.currentUser$ | async) as username; else loginBtn">
        <span class="welcome-text" data-testid="current-user">Bonjour, <strong>{{ username }}</strong></span>
        <button mat-raised-button class="custom-auth-btn" (click)="authService.logout()" data-testid="logout-button">Déconnexion</button>
    </div>
    <ng-template #loginBtn>
        <button mat-raised-button class="custom-auth-btn" (click)="openAuth()" data-testid="login-button">
            Connexion / Inscription
        </button>
    </ng-template>
</nav>

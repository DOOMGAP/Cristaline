spring:
  datasource:
    url: jdbc:h2:mem:cristal;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins:
      - http://localhost:4200
      - http://localhost:4201
      - http://127.0.0.1:4200
      - http://127.0.0.1:4201
